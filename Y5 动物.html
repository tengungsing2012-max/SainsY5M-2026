            {
                qZh: "动物利用外形特征自卫和适应气候，这说明了什么能力？",
                qEn: "Animals use physical traits for defense and climate adaptation. What ability does this show?",
                options: [
                    { zh: "物种生存的能力", en: "Species survival ability", correct: true },
                    { zh: "交流的能力", en: "Communication ability", correct: false },
                    { zh: "光合作用的能力", en: "Photosynthetic ability", correct: false }
                ],
                expZh: "为了避免绝种，动物都有让它们的物种继续生存的本能和绝招。",
                expEn: "To avoid extinction, animals have instincts and traits to ensure species survival."
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 12;
        let timerInterval;
        let hasAnswered = false;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            loadQuestion();
        }

        function startTimer() {
            timeLeft = 12;
            document.getElementById('timer-text').innerText = `⏱ ${timeLeft}s`;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-text').innerText = `⏱ ${timeLeft}s`;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    handleTimeout();
                }
            }, 1000);
        }

        function loadQuestion() {
            hasAnswered = false;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('feedback-container').className = 'feedback-box';
            
            const q = questions[currentQuestionIndex];
            document.getElementById('question-counter').innerText = `题/Q: ${currentQuestionIndex + 1}/${questions.length}`;
            document.getElementById('q-text-zh').innerText = q.qZh;
            document.getElementById('q-text-en').innerText = q.qEn;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            // Shuffle options
            let options = [...q.options];
            options.sort(() => Math.random() - 0.5);

            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `${opt.zh} <br><small style="color:#bbb;">${opt.en}</small>`;
                btn.onclick = () => selectOption(btn, opt.correct, options);
                optionsContainer.appendChild(btn);
            });

            startTimer();
        }

        function selectOption(selectedBtn, isCorrect, optionsData) {
            if (hasAnswered) return;
            hasAnswered = true;
            clearInterval(timerInterval);

            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (isCorrect) {
                selectedBtn.classList.add('correct');
                score += 4;
                showFeedback(true);
            } else {
                selectedBtn.classList.add('wrong');
                // Highlight the correct one
                buttons.forEach((btn, index) => {
                    // find which button corresponds to the correct option
                    if (btn.innerHTML.includes(optionsData.find(o => o.correct).zh)) {
                        btn.classList.add('correct');
                    }
                });
                showFeedback(false);
            }
        }

        function handleTimeout() {
            if (hasAnswered) return;
            hasAnswered = true;
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            // highlight correct
            const q = questions[currentQuestionIndex];
            buttons.forEach((btn) => {
                if (btn.innerHTML.includes(q.options.find(o => o.correct).zh)) {
                    btn.classList.add('correct');
                }
            });
            showFeedback(false, true);
        }

        function showFeedback(isCorrect, isTimeout = false) {
            const fbBox = document.getElementById('feedback-container');
            const fbTitle = document.getElementById('feedback-title');
            const expText = document.getElementById('explanation-text');
            const q = questions[currentQuestionIndex];

            fbBox.classList.add('show');
            if (isCorrect) {
                fbBox.classList.add('correct-bg');
                fbTitle.innerHTML = '✅ 回答正确！ Correct!';
            } else {
                fbBox.classList.add('wrong-bg');
                fbTitle.innerHTML = isTimeout ? '⏰ 时间到！ Time is up!' : '❌ 回答错误！ Incorrect!';
            }
            expText.innerHTML = `${q.expZh} <br> <span style="color:#ccc; font-size: 0.95em;">${q.expEn}</span>`;
            
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('final-score').innerText = score;
            
            let grade = 'E';
            let color = '#FF5252';
            let msg = "持续加油，永不放弃！ Keep going, never give up!";
            
            if (score > 84) { grade = 'A'; color = '#4CAF50'; msg = "太棒了！老师为你感到骄傲！ Excellent work!"; }
            else if (score > 68) { grade = 'B'; color = '#8BC34A'; msg = "做得很棒！继续保持！ Great job!"; }
            else if (score > 52) { grade = 'C'; color = '#FFEB3B'; msg = "不错哦！再努力一点点！ Good effort!"; }
            else if (score > 36) { grade = 'D'; color = '#FF9800'; msg = "及格了，下次一定能更好！ You passed, keep practicing!"; }

            const gradeElement = document.getElementById('grade-display');
            gradeElement.innerText = grade;
            gradeElement.style.color = color;
            document.getElementById('motivational-message').innerText = msg;
        }
    </script>
</body>
</html>
